name: Deploy to Server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" "ftp://$FTP_HOST:$FTP_PORT" <<'LFTP'
          set ftp:ssl-allow false
          set net:max-retries 3
          cd bajka.pp.ua/minecraft/lua

          # Видаляємо старі файли версій (тепер є git)
          set cmd:fail-exit false
          rm index_v1.html
          rm index_v2.html
          rm index_v3.html
          rm index_v4_20251230.html
          rm index_v5_20260118.html
          set cmd:fail-exit true

          # Завантажуємо актуальні файли
          put index.html
          put upload.php
          put list_files.php
          put turtle_completions.js
          bye
          LFTP
