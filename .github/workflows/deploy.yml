name: Deploy to Server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
        run: |
          lftp -u "$SFTP_USER","$SFTP_PASS" "sftp://$SFTP_HOST:$SFTP_PORT" <<'LFTP'
          set sftp:auto-confirm yes
          set net:max-retries 3
          cd /sites/bajka.pp.ua/minecraft/lua

          # Прибираємо старі файли версій (тепер є git)
          -rm index_v1.html
          -rm index_v2.html
          -rm index_v3.html
          -rm index_v4_20251230.html
          -rm index_v5_20260118.html

          # Завантажуємо актуальні файли
          put index.html
          put upload.php
          put list_files.php
          put turtle_completions.js
          bye
          LFTP
