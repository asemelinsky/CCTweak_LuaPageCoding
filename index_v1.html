<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <title>ComputerCraft : Lua Editor</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background-color: #1e1e1e;
      color: #ddd;
    }

    #container {
      display: flex;
      flex-direction: row;
      height: 100vh;
      width: 100vw;
    }

    /* 🧠 Редактор коду ліворуч */
    #editor {
      flex-grow: 1;
      height: 100%;
      width: 100%;
      font-size: 14px;
      position: relative;
    }

    /* 📋 Панель керування праворуч */
    #sidebar {
      width: 300px;
      background-color: #252526;
      color: #ddd;
      padding: 15px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      box-shadow: -2px 0 5px rgba(0,0,0,0.4);
    }

    input, button {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      box-sizing: border-box;
    }

    input {
      background-color: #333;
      color: #eee;
    }

    button {
      background-color: #0e639c;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background-color: #1177bb;
    }

    h2 {
      margin-top: 0;
      font-size: 18px;
      border-bottom: 1px solid #444;
      padding-bottom: 5px;
    }

    #ftpStatus {
      margin-top: 8px;
      font-size: 0.9em;
      color: #9cdcfe;
      word-wrap: break-word;
    }
  </style>

  <!-- Ace Editor CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ace.js"></script>
</head>
<body>
  <div id="container">
    <!-- 🧠 Lua редактор -->
    <div id="editor">-- Write your Lua code here</div>

    <!-- 📋 Панель керування -->
    <div id="sidebar">
      <h2>Lua Editor</h2>
      <input type="text" id="fileName" value="program.lua" placeholder="Назва файлу">
      <button id="saveBtn">💾 Зберегти локально</button>

      <h2>📤 Вивантаження</h2>
      <input type="number" id="compNumber" placeholder="Номер комп'ютера (наприклад, 154)">
      <button id="uploadBtn">Вивантажити на сервер</button>
      <p id="ftpStatus"></p>
    </div>
  </div>

  <script>
    window.onload = function() {
      // 🧩 Ініціалізація Ace Editor
      const editor = ace.edit("editor");
      editor.setTheme("ace/theme/monokai");
      editor.session.setMode("ace/mode/lua");
      editor.setShowPrintMargin(false);
      editor.setOptions({
        fontSize: "14px",
        showLineNumbers: true,
        showGutter: true,
        highlightActiveLine: true,
        wrap: true,
      });

      // 💾 Збереження локально
      document.getElementById("saveBtn").onclick = function() {
        const code = editor.getValue();
        const fileName = document.getElementById("fileName").value || "program.lua";

        const blob = new Blob([code], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = fileName;
        a.click();
      };

      // 📤 Вивантаження на сервер
      document.getElementById("uploadBtn").onclick = function uploadToFtp() {
        const code = editor.getValue().trim();
        const comp = document.getElementById("compNumber").value.trim();
        const fileName = document.getElementById("fileName").value.trim();
        const status = document.getElementById("ftpStatus");

        if (!code || !comp || !fileName) {
          status.innerText = "⛔ Заповніть всі поля.";
          return;
        }

        status.innerText = "⏳ Відправлення...";

        fetch("upload.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code, comp, fileName })
        })
        .then(res => res.text())
        .then(result => status.innerText = "✅ " + result)
        .catch(err => status.innerText = "❌ Помилка: " + err.message);
      };
    };
  </script>
</body>
</html>
